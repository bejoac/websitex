<div id="entry-container{{entry.id}}" class="entry-container">
  <span>{{ entry.user_entry }}</span> 
  <button 
    hx-delete="/delete_entry/{{ entry.id }}/" 
    hx-target="#entry-container{{entry.id}}"
    hx-swap="outerHTML"
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    🗑️
  </button>
</div>
