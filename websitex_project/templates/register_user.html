{% load static %}
<form id="register-user-form" class="login-user-form">
  Username: <input name="username" type="text" required></input>
  Password: <input name="password" type="password" required></input>
  <button
    hx-post="/register_user/"
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' 
    hx-target="#register-user-form"
    hx-swap="outerHTML">
    Register
  </button>
</form>
