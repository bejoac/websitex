{% load static %}
<form id="login-user-form" class="login-user-form">
  <h1>Login</h1>
  Username: <input name="username" type="text" required></input>
  Password: <input name="password" type="password" required></input>
  <button 
    hx-post="/login_user/" 
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' 
    hx-target="#login-user-form" 
    hx-swap="outerHTML">
    Login
  </button>
  <button
    hx-get="/get_register_form"
    hx-target="#login-user-form"
    hx-swap="outerHTML">
    No Account?
  </button>
</form>
